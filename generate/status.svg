  </g>
  <g class="fade" style="animation-delay:.4s">
    <rect x="226" y="88" width="82" height="24" rx="7" fill="#2a213b"/>
    <text x="243" y="104" class="label">Frontend</text>
  </g>
  <g class="fade" style="animation-delay:.5s">
    <rect x="316" y="88" width="118" height="24" rx="7" fill="#2a213b"/>
